# Cloud Run service spec — lelu-mcp (MCP server)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lelu-mcp
  labels:
    app: lelu
    component: mcp
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: lelu-mcp@__PROJECT__.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: __IMAGE__
          ports:
            - name: http1
              containerPort: 3001
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_PORT
              value: "3001"
            - name: LELU_ENGINE_URL
              value: "__ENGINE_URL__"
            - name: LELU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lelu-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
  traffic:
    - percent: 100
      latestRevision: true
